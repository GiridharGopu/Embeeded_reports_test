<!DOCTYPE html>
<html>
<head>
    <title>Power BI Viewer</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            padding: 10px;
            background: #f5f5f5;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        .iframe-container {
            flex: 1;
            position: relative;
        }

        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <input type="text" id="url" placeholder="Paste Power BI Embed URL here">
        <button onclick="loadReport()">Load</button>
    </div>

    <div class="iframe-container">
        <iframe id="frame"></iframe>
    </div>

    <script>
        function loadReport() {
            const url = document.getElementById("url").value;
            document.getElementById("frame").src = url;
        }

        // OPTIONAL: Auto load default report
        // Replace below with your Power BI link
        window.onload = () => {
            const defaultUrl = "";
            if (defaultUrl) {
                document.getElementById("frame").src = defaultUrl;
            }
        };
    </script>

</body>
</html>
